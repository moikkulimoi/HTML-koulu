<!DOCTYPE html>
<html lang="fi">

<head>
    <title> Lomake esimerkki</title>
    <meta charset="UTF-8">
    <link type="text/css" rel="stylesheet" href="css/tyylit.css">
</head>

<body>

    <form>


        <div class="container">
            <fieldset class="row-container">
                <legend>Henkilötiedot</legend>
                <div class="container">
                    <div class="input-container">
                        <label for="fname">Etunimi</label>
                        <input type="text" id="fname">
                    </div>
                    <div class="input-container">
                        <label for="Iname">Sukunimi</label>
                        <input type="text" id="Iname">
                    </div>

                    <div class="input-container"><label for="password">Salasana</label>
                        <input type="password" id="password">
                    </div>
                </div>



                <div class="container">

                    <legend>Valinta</legend>


                    <div class="input-container">
                        <input type="checkbox" id="emailselect">
                        <label for="emailselect">Sähköposti</label>
                    </div>
                    <div class="input-container">
                        <input type="checkbox" id="telselect">
                        <label for="telselect">Puhelin</label>
                    </div>

                </div>

            </fieldset>



            <fieldset>
                <div class="container">
                    <div class="input-container">
                        <textarea rows="10" cols="50"></textarea> <!--Lisää ison texti boxin-->
                    </div>
                    <div class="input-container">
                        <input type="file" id="file"> <!--LISÄÄ "valitse tiedosto" naviskan-->
                        <input type="submit" value="Lähetä">
                    </div>
                </div>


            </fieldset>
        </div>


    </form>



</body>

</html>
